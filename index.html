<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Carefree — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="static/css/login.css" />
    <link rel="icon" type="image/svg+xml" href="static/favicon.svg">
</head>
<body>

    <div class="bg-geo">
        <!-- Floating orbs -->
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>

        <!-- Swirly line SVG -->
        <svg viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">

            <!-- Large outer spirals -->
            <path class="swirl swirl-1" d="
                M 720 450
                C 820 250, 1100 200, 1200 400
                C 1300 600, 1150 850, 900 880
                C 650 910, 350 780, 280 560
                C 210 340, 400 100, 650 80
                C 900 60, 1180 180, 1280 430
                C 1380 680, 1200 950, 920 970
                C 640 990, 280 820, 200 540
            " />

            <!-- Tighter inner spiral -->
            <path class="swirl swirl-2" d="
                M 200 100
                C 400 -50, 800 20, 950 200
                C 1100 380, 1050 650, 850 750
                C 650 850, 350 800, 220 620
                C 90 440, 180 180, 400 120
                C 620 60, 900 150, 1020 370
                C 1140 590, 1020 850, 780 900
            " />

            <!-- Flowing wave across middle -->
            <path class="swirl swirl-3" d="
                M -100 450
                C 100 300, 300 600, 500 450
                C 700 300, 900 600, 1100 450
                C 1300 300, 1500 500, 1600 400
            " />

            <!-- Diagonal swirling ribbon top-right -->
            <path class="swirl swirl-4" d="
                M 1300 -50
                C 1200 100, 1400 300, 1250 450
                C 1100 600, 900 500, 800 650
                C 700 800, 750 950, 600 1000
            " />

            <!-- Bottom-left curl -->
            <path class="swirl swirl-5" d="
                M -80 700
                C 50 600, 200 700, 300 600
                C 400 500, 350 350, 500 300
                C 650 250, 800 350, 850 500
                C 900 650, 800 800, 650 850
                C 500 900, 300 830, 200 720
                C 100 610, 150 480, 300 430
            " />

            <!-- Tight spiral top-left -->
            <path class="swirl swirl-6" d="
                M 100 50
                C 250 -20, 420 80, 480 220
                C 540 360, 460 520, 320 570
                C 180 620, 40 530, 20 390
                C 0 250, 120 130, 260 120
                C 400 110, 520 200, 550 340
                C 580 480, 490 620, 360 650
            " />

            <!-- Long lazy S-curve -->
            <path class="swirl swirl-7" d="
                M 0 200
                C 200 100, 400 300, 600 200
                C 800 100, 1000 350, 1200 250
                C 1400 150, 1500 300, 1440 400
            " />

            <!-- Wide ellipse orbit -->
            <ellipse class="swirl swirl-8" cx="720" cy="450" rx="580" ry="320" />

            <!-- Smaller tight ellipse off-center -->
            <ellipse class="swirl swirl-9" cx="400" cy="600" rx="280" ry="160" />

            <!-- Another loose S bottom -->
            <path class="swirl swirl-10" d="
                M 100 900
                C 300 780, 500 880, 700 780
                C 900 680, 1100 820, 1350 750
                C 1450 720, 1500 800, 1440 850
            " />

        </svg>
    </div>

    <div class="card">
        <div class="card-top">
            <div class="brand">
                <div class="brand-icon">
                    <svg viewBox="0 0 24 24"><path d="M12 21.593c-5.63-5.539-11-10.297-11-14.402 0-3.791 3.068-5.191 5.281-5.191 1.312 0 4.151.501 5.719 4.457 1.59-3.968 4.464-4.447 5.726-4.447 2.54 0 5.274 1.621 5.274 5.181 0 4.069-5.136 8.625-11 14.402z" /></svg>
                </div>
                <span class="brand-name">Care<span>free</span></span>
            </div>
            <div class="brand-tag">Aiding Caretakers</div>
        </div>

        <div class="card-body">

            <!-- View 1: Choose Role -->
            <div class="view active" id="v-role">
                <div class="view-title">Welcome back</div>
                <div class="view-sub">Select your role to continue</div>
                <div class="roles">
                    <div class="role-card" onclick="pickRole('caretaker',this)">
                        <span class="role-icon">🩺</span>
                        <div class="role-label">Caretaker</div>
                        <div class="role-desc">Manage patients & tasks</div>
                    </div>
                    <div class="role-card" onclick="pickRole('guardian',this)">
                        <span class="role-icon">👨‍👩‍👧</span>
                        <div class="role-label">Guardian</div>
                        <div class="role-desc">View patient updates</div>
                    </div>
                </div>
            </div>

            <!-- View 2: Sign In -->
            <div class="view" id="v-signin">
                <div class="view-title" id="si-title">Sign In</div>
                <div class="view-sub" id="si-sub">Enter your credentials</div>
                <div class="alert alert-err" id="si-err"></div>
                <div class="field">
                    <label id="si-user-label">Username</label>
                    <input id="si-user" placeholder="Your username" autocomplete="username" />
                </div>
                <div class="field">
                    <label>Password</label>
                    <input id="si-pass" type="password" placeholder="••••••••" autocomplete="current-password" />
                </div>
                <button class="btn btn-primary" onclick="doSignIn()">Sign In</button>

                <!-- Only visible for caretaker role -->
                <div id="si-signup-link" style="display:none">
                    <div class="or-row"><hr /><span>New caretaker?</span><hr /></div>
                    <button class="btn btn-ghost" onclick="show('v-signup')" style="margin-top:0">Create an account →</button>
                </div>

                <div class="back-link"><a onclick="show('v-role')">← Change role</a></div>
            </div>

            <!-- View 3: Caretaker Sign Up -->
            <div class="view" id="v-signup">
                <div class="view-title">Create Account</div>
                <div class="view-sub">Register as a new caretaker</div>
                <div class="alert alert-err" id="su-err"></div>
                <div class="alert alert-ok" id="su-ok"></div>

                <div class="section-divider">Personal Info</div>
                <div class="field">
                    <label>Full Name</label>
                    <input id="su-name" placeholder="Your full name" />
                </div>
                <div class="row2">
                    <div class="field">
                        <label>Age</label>
                        <input id="su-age" type="number" placeholder="28" min="18" max="80" />
                    </div>
                    <div class="field">
                        <label>Gender</label>
                        <select id="su-gender">
                            <option value="">Select</option>
                            <option>Male</option>
                            <option>Female</option>
                            <option>Other</option>
                        </select>
                    </div>
                </div>
                <div class="field">
                    <label>Contact Number</label>
                    <input id="su-contact" placeholder="03xxxxxxxxx" />
                </div>

                <div class="section-divider">Professional Info</div>
                <div class="row2">
                    <div class="field">
                        <label>Experience (Years)</label>
                        <input id="su-exp" type="number" placeholder="3" min="0" max="50" />
                    </div>
                    <div class="field">
                        <label>Qualification</label>
                        <input id="su-qual" placeholder="e.g. BSc Nursing" />
                    </div>
                </div>
                <div class="field">
                    <label>Skills <span style="font-weight:400;text-transform:none;letter-spacing:0">(comma separated)</span></label>
                    <input id="su-skills" placeholder="e.g. Elderly Care, Physiotherapy, First Aid" />
                </div>

                <button class="btn btn-gold" onclick="doSignUp()">Create Account</button>
                <div class="back-link"><a onclick="show('v-role')">← Back to login</a></div>
            </div>

        </div>
    </div>

    <script src="/static/js/login.js"></script>
</body>
</html>
